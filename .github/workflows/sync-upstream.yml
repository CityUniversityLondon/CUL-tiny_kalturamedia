name: Sync with upstream

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clone upstream
        run: |
          git clone --filter=blob:none --branch MOODLE_405_STABLE \
            https://github.com/kaltura/moodle_plugin.git upstream

      - name: Split lib/editor/tiny/plugins/kalturamedia subtree
        id: split
        working-directory: upstream
        run: |
          sha=$(git subtree split --prefix=lib/editor/tiny/plugins/kalturamedia HEAD)
          echo "sha=$sha" >> $GITHUB_OUTPUT

      - name: Push to origin
        working-directory: upstream
        run: |
          git push \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            ${{ steps.split.outputs.sha }}:refs/heads/MOODLE_405_STABLE --force
